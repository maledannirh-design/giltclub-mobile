<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily Check-In</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    html, body{
      margin:0;
      padding:0;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:Arial;
    }

    /* READER */
    #reader{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      z-index:1;
    }

    /* FORCE VIDEO FULLSCREEN */
    #reader video{
      position:absolute !important;
      top:0;
      left:0;
      width:100vw !important;
      height:100vh !important;
      object-fit:cover !important;
      z-index:1 !important;
    }

    /* TOP BAR */
    .top-bar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:60px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:20;
      pointer-events:none;
    }

    .title{
      color:#fff;
      font-size:18px;
      font-weight:600;
    }

    /* BACK BUTTON */
    .back-btn{
      position:fixed;
      top:15px;
      left:15px;
      z-index:30;
      background:rgba(0,0,0,0.6);
      border:none;
      color:#fff;
      padding:8px 14px;
      border-radius:12px;
      cursor:pointer;
      pointer-events:auto;
    }

    /* SWITCH BUTTON */
    .switch-btn{
      position:fixed;
      top:15px;
      right:15px;
      z-index:30;
      background:rgba(0,0,0,0.6);
      border:none;
      color:#fff;
      padding:8px 14px;
      border-radius:12px;
      cursor:pointer;
      pointer-events:auto;
    }

    /* RESULT */
    #result{
      position:fixed;
      bottom:40px;
      width:100%;
      text-align:center;
      z-index:30;
      color:#fff;
    }

    /* SCAN FRAME */
    .scan-frame{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:10;
    }

    .scan-box{
      width:80vw;
      height:80vw;
      max-width:420px;
      max-height:420px;
      border:3px solid #FFD700;
      border-radius:22px;
      box-shadow:
        0 0 30px rgba(255,215,0,0.9),
        inset 0 0 30px rgba(255,215,0,0.5);
    }
  </style>
</head>

<body>

  <!-- CAMERA -->
  <div id="reader"></div>

  <!-- OVERLAY FRAME -->
  <div class="scan-frame">
    <div class="scan-box"></div>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="title">Scan Kartu Anda</div>
  </div>

  <!-- BUTTONS -->
  <button class="back-btn" onclick="window.history.back()">
    ← Kembali
  </button>

  <button class="switch-btn" onclick="switchDailyCamera()">
    🔄 Kamera
  </button>

  <div id="result"></div>

  <script type="module">
    import { initDailyScanner } from "./scanDaily.js";
    initDailyScanner("reader","result");
  </script>

</body>
</html>
