<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily Check-In</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    html, body{
      margin:0;
      padding:0;
      height:100%;
      background:#000;
      color:#fff;
      font-family:Arial;
      overflow:hidden;
    }

    h2{
      position:absolute;
      top:20px;
      width:100%;
      text-align:center;
      z-index:5;
      font-size:18px;
    }

    #reader{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
    }

    #result{
      position:absolute;
      bottom:40px;
      width:100%;
      text-align:center;
      z-index:5;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn{
      position:absolute;
      top:20px;
      left:20px;
      z-index:6;
      background:rgba(0,0,0,0.6);
      border:none;
      color:#fff;
      padding:8px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    /* ===== SCAN FRAME ===== */
    .scan-frame{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      z-index:4;
    }

    .scan-box{
      width:80vw;
      height:80vw;
      max-width:420px;
      max-height:420px;
      border:3px solid #FFD700;
      border-radius:20px;
      box-shadow:
        0 0 25px rgba(255,215,0,0.6),
        inset 0 0 25px rgba(255,215,0,0.3);
      position:relative;
    }

    /* corner accents */
    .scan-box::before,
    .scan-box::after{
      content:"";
      position:absolute;
      width:50px;
      height:50px;
      border:4px solid #FFD700;
    }

    .scan-box::before{
      top:-4px;
      left:-4px;
      border-right:none;
      border-bottom:none;
      border-radius:20px 0 0 0;
    }

    .scan-box::after{
      bottom:-4px;
      right:-4px;
      border-left:none;
      border-top:none;
      border-radius:0 0 20px 0;
    }

  </style>
</head>

<body>

  <button class="back-btn" onclick="window.history.back()">
    ← Kembali
  </button>

  <h2>Scan Kartu Anda</h2>

  <div id="reader"></div>

  <!-- Visual Scan Box -->
  <div class="scan-frame">
    <div class="scan-box"></div>
  </div>

  <div id="result"></div>

  <script type="module">
    import { initDailyScanner } from "./scanDaily.js";
    initDailyScanner("reader","result");
  </script>

</body>
</html>
