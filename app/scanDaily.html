<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Daily Check-In</title>

  <!-- CAMERA LIBRARY (WAJIB DI ATAS) -->
  <script src="https://unpkg.com/html5-qrcode"></script>

 <style>
  html, body{
    margin:0;
    padding:0;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial;
  }

  #reader{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    z-index:1;
  }

  #reader video{
    position:absolute !important;
    top:0;
    left:0;
    width:100vw !important;
    height:100vh !important;
    object-fit:cover !important;
    z-index:1 !important;
  }

  /* ===== TOP TITLE ===== */
 .top-bar{
  position:fixed;
  top:env(safe-area-inset-top);
  left:0;
  width:100%;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:40;
  pointer-events:none;
}

.title{
  color:#fff;
  font-size:20px;
  font-weight:700;
}

  /* ===== BIG MOBILE BUTTONS ===== */
.back-btn,
.switch-btn{
  position:fixed;
  top:calc(15px + env(safe-area-inset-top));
  z-index:50;

  background:rgba(0,0,0,0.65);
  border:none;
  color:#fff;

  padding:14px 20px;
  border-radius:18px;

  font-size:18px;
  font-weight:700;

  letter-spacing:0.5px;

  cursor:pointer;

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);

  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.back-btn{
  left:16px;
}

.switch-btn{
  right:16px;
}

  /* ===== RESULT CENTER ===== */
  #result{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:40;
    pointer-events:none;
  }

  .result-box{
    background:rgba(0,0,0,0.75);
    padding:24px 30px;
    border-radius:20px;
    text-align:center;
    font-size:20px;
    font-weight:600;
    backdrop-filter: blur(10px);
    animation: pop 0.25s ease;
  }

  .success{
    border:3px solid gold;
    box-shadow:0 0 30px rgba(255,215,0,0.7);
  }

  .error{
    border:3px solid #e74c3c;
    box-shadow:0 0 25px rgba(231,76,60,0.6);
  }

  @keyframes pop{
    from{ transform:scale(0.8); opacity:0; }
    to{ transform:scale(1); opacity:1; }
  }

  /* ===== SCAN FRAME ===== */
  .scan-frame{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    z-index:10;
  }

  .scan-box{
    width:80vw;
    height:80vw;
    max-width:420px;
    max-height:420px;
    border:3px solid #FFD700;
    border-radius:22px;
    box-shadow:
      0 0 30px rgba(255,215,0,0.9),
      inset 0 0 30px rgba(255,215,0,0.5);
  }
</style>
</head>

<body>

  <!-- CAMERA -->
  <div id="reader"></div>

  <!-- OVERLAY FRAME -->
  <div class="scan-frame">
    <div class="scan-box"></div>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="title">Scan Kartu Anda</div>
  </div>

  <!-- BUTTONS -->
  <button class="back-btn" onclick="window.history.back()">
    ← Kembali
  </button>

  <button class="switch-btn" onclick="switchDailyCamera()">
    🔄 Kamera
  </button>

  <div id="result"></div>

  <!-- MODULE INIT (SAFARI SAFE) -->
  <script type="module">
    import { initDailyScanner } from "./scanDaily.js?v=14";

    window.addEventListener("load", () => {

      if (typeof Html5Qrcode === "undefined") {
        document.getElementById("result").innerHTML =
          "Camera library gagal dimuat.";
        return;
      }

      initDailyScanner("reader","result");
    });
  </script>

</body>
</html>
