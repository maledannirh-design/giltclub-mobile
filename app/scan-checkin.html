<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Check-In</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      overflow:hidden;
      font-family:Arial, sans-serif;
      color:white;
    }

    /* Fullscreen Reader */
    #reader{
      position:fixed;
      inset:0;
      width:100vw;
      height:100vh;
      z-index:1;
    }

    #reader video{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    #reader{
  z-index:1;
}

#reader video{
  object-fit:cover;
  visibility:visible !important;
  display:block !important;
}

    /* Top Title */
    .scan-title{
      position:fixed;
      top:20px;
      left:0;
      right:0;
      text-align:center;
      z-index:5;
      font-size:18px;
      font-weight:bold;
      text-shadow:0 2px 6px rgba(0,0,0,0.6);
    }

    /* Overlay dark layer */
    .scan-frame{
  pointer-events:none;
  z-index:5;
}

    /* Close button */
    .close-btn{
      position:fixed;
      top:20px;
      right:20px;
      z-index:6;
      background:rgba(0,0,0,0.6);
      border:none;
      color:white;
      font-size:14px;
      padding:8px 12px;
      border-radius:8px;
      cursor:pointer;
    }

    /* Result Box */
    #result{
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);
      z-index:6;
      width:90%;
      max-width:380px;
      text-align:center;
    }

  </style>
</head>
<body>

  <div class="scan-title">Check-In Session</div>
<button class="close-btn" onclick="window.history.back()">Close</button>

<!-- MEMBER SELECT -->
<div id="checkinControlPanel" style="
  position:fixed;
  top:70px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  width:90%;
  max-width:400px;
  text-align:center;
">

  <select id="memberSelect" style="
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:10px;
  ">
    <option value="">Pilih Member</option>
  </select>

  <button id="startScanBtn" style="
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#2ecc71;
    color:#000;
    font-weight:bold;
  ">
    Mulai Scan
  </button>

</div>

<div id="reader" style="display:none;"></div>
<div id="result"></div>

  <script type="module">

    import { initCheckinScanner } from "./scanCheckin.js";

    const scheduleId = sessionStorage.getItem("checkinScheduleId");

    if(!scheduleId){
      document.getElementById("result").innerHTML =
        "<div style='background:#3a1c1c;padding:16px;border-radius:12px;'>Schedule tidak ditemukan</div>";
    }else{

      initCheckinScanner({
  readerId: "reader",
  resultId: "result",
  scheduleId,
  memberSelectId: "memberSelect",
  startBtnId: "startScanBtn"
});

    }

  </script>

</body>
</html>
