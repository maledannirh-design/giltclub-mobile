<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GILT Club App - Modern Tennis</title>

  <!-- Styles -->
 <link rel="stylesheet" href="splash.css" />
<link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="akun/akun.css">
<link rel="stylesheet" href="wallet.css" />
  <link rel="stylesheet" href="admin.css" />
   <link rel="stylesheet" href="booking.css">
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="./image/logo_giltclub.webp" />
  <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">
  
  
</head>

<body>
<div id="splashScreen">
  <div class="splash-wrapper">

    <div class="splash-logo-container">
      <img src="./image/splash_giltclub.png" class="splash-logo">
    </div>

    <div class="splash-text-container">
      <div id="splashText" class="splash-text"></div>
    </div>

  </div>
</div>
  <div id="app">

    <!-- ================= HEADER ================= -->
    <header class="header">
      <div class="header-title">GILTIAN SYSTEM</div>

      <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()">
          🌙
        </button>
        <span id="currentUserLabel" class="user-label">
          Not logged in
        </span>

      </div>
    </header>


    <!-- ================= MAIN CONTENT ================= -->
    <main id="content" class="content"></main>


    <!-- ================= BOTTOM NAV ================= -->
    <nav class="bottom-nav">
      <button data-page="home" onclick="navigate('home')">
        🏠
        <span>Home</span>
      </button>

      <button data-page="booking" onclick="navigate('booking')">
        🎾
        <span>Book</span>
      </button>
      <button data-page="members" onclick="navigate('members')">
  👥
  <span>Member</span>
      </button>
<button data-page="wallet" onclick="navigate('wallet')">
  <i class="fa-solid fa-wallet"></i>
  <span>Wallet</span>
</button>
      </button>
      <button data-page="reward" onclick="navigate('reward')">
  🎁
  <span>Reward</span>
</button>
     
      <button data-page="ranking" onclick="navigate('ranking')">
        🏆
        <span>Rank</span>
      </button>

       <button data-page="store" onclick="navigate('store')">
    🛍️
    <span>Toko</span>
  </button>

      <button onclick="navigate('account')">👤<span>Akun</span></button>
<button data-page="admin" onclick="navigate('admin')">
  🛡
  <span>Admin</span>
</button>
    </nav>

  </div>
<div id="createSessionSheet" class="sheet-container"></div>
  <!-- ================= LIBRARIES ================= -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- ================= MAIN APP ================= -->
  <script type="module" src="main.js"></script>
  <script type="module" src="./wallet.js"></script>
<script src="splash.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>
  <script type="module" src="./pinTrx.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script type="module" src="booking.js"></script>
</body>
</html>
