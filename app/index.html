<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GILT & ME Club App - Modern Tennis</title>

  <!-- Styles -->
  <link rel="stylesheet" href="splash.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="akun/akun.css">
  <link rel="stylesheet" href="wallet.css" />
  <link rel="stylesheet" href="admin.css" />
  <link rel="stylesheet" href="booking.css">
  <link rel="stylesheet" href="./store/store.css">
  <link rel="stylesheet" href="./skill.css">
  <link rel="stylesheet" href="verifiedlist/verified.css">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/css/intlTelInput.css">

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="./image/logo_giltclub.webp" />
</head>

<body>

  <!-- ================= SPLASH ================= -->
  <div id="splashScreen">
    <div class="splash-wrapper">
      <div class="splash-logo-container">
        <img src="./image/splash_giltclub.png" class="splash-logo">
      </div>
      <div class="splash-text-container">
        <div id="splashText" class="splash-text"></div>
      </div>
    </div>
  </div>

  <div id="app">

  <!-- ================= HEADER ================= -->
<header class="header">

  <div class="header-title">
    Girl in Love with Tennis..<br>
    - Maha Elites -
  </div>

  <div class="header-actions">

    <!-- TOP ROW -->
    <div class="header-top-row">

      <button class="theme-toggle" onclick="toggleTheme()">
        🌙
      </button>

      <span id="currentUserLabel" class="user-label">
        Not logged in
      </span>

    </div>

    <!-- BOTTOM ROW -->
    <div class="header-bottom-row">

      <!-- ONLINE + WEEKLY STATS -->
      <div class="header-stats">

        <div class="stat-online">
          🟢 <span id="onlineMembers">0</span> member
        </div>

        <div class="stat-weekly">
          👣 <span id="weeklyVisits">0</span> kunjungan
        </div>

      </div>

      <!-- CHAT BUTTON -->
      <button id="chatButton" class="chat-btn" onclick="navigate('chat')">
        <i class="fa-solid fa-envelope"></i>
        <span id="chatUnreadBadge" class="chat-badge hidden">0</span>
      </button>

    </div>

  </div>

</header>

    <!-- ================= MAIN CONTENT ================= -->
    <main id="content" class="content"></main>

    <!-- ================= BOTTOM NAV ================= -->
    <nav class="bottom-nav">

  <button data-page="home" onclick="navigate('home')">
    🌿
    <span>TERAS</span>
  </button>

  <button data-page="booking" onclick="navigate('booking')">
    🗓️
    <span>JADWAL</span>
  </button>
      
      <button data-page="skill" onclick="navigate('skill')">
  <i class="fa-solid fa-bullseye"></i>
  <span>SKILL</span>
</button>
      
  <button data-page="wallet" onclick="navigate('wallet')">
    <i class="fa-solid fa-wallet"></i>
    <span>SALDO</span>
  </button>

  <button data-page="store" onclick="navigate('store')">
    👜
    <span>TOKO</span>
  </button>

  <button data-page="account" onclick="navigate('account')">
    🪪
    <span>AKUN</span>
  </button>

  <button data-page="admin" onclick="navigate('admin')">
    🛡
    <span>ADMIN</span>
  </button>

</nav>

  </div>

  <div id="createSessionSheet" class="sheet-container"></div>

<div id="verifyModal" class="verify-modal">
  <div class="verify-modal-card">

    <div class="verify-icon">🔒</div>

    <div class="verify-title">
      Skill Locked
    </div>

    <div class="verify-text">
      Fitur Skill hanya tersedia untuk member yang sudah terverifikasi.
      Aktivasi membership card untuk membuka akses ini.
    </div>

    <div class="verify-buttons">
      <button class="verify-primary" onclick="openMembership()">
        Aktifkan Membership
      </button>

      <button class="verify-secondary" onclick="closeVerifyModal()">
        Tutup
      </button>
    </div>

  </div>
</div>
  
  <!-- ================= LIBRARIES ================= -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- ================= MAIN APP ================= -->
  <script type="module" src="main.js"></script>
  <script type="module" src="./wallet.js"></script>
  <script type="module" src="./pinTrx.js"></script>
  <script type="module" src="admin.js"></script>
  <script type="module" src="./store/store.js"></script>

  <script src="splash.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@23.0.10/build/js/intlTelInput.min.js"></script>

</body>
</html>
