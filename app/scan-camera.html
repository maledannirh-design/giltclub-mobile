<script type="module">
  import { startUniversalScanner } from "./scannerEngine.js";
  import "./scanQR.js";
  import { auth } from "./firebase.js";

  const resultBox = document.getElementById("result");

  const urlParams = new URLSearchParams(window.location.search);
  const mode = urlParams.get("mode") || "member";
  const scheduleId = urlParams.get("schedule");

  const currentUser = auth.currentUser
    ? {
        uid: auth.currentUser.uid,
        role: window.currentUserData?.role
      }
    : null;

  startUniversalScanner({
    readerId: "reader",
    resultId: "result",
    mode,
    scheduleId,
    currentUser
  });
</script>
